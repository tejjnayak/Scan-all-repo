name: Scan multiple repos on push

on:
  push:
    branches:
      - main

jobs:
  scan-repos:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout scan repo
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Install endorctl
        run: |
          curl -fsSL https://api.endorlabs.com/download/endorctl/linux/amd64 -o endorctl
          chmod +x endorctl
          sudo mv endorctl /usr/local/bin/

      - name: Scan repositories and tag projects
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          ENDOR_NAMESPACE: tej-learn
        run: |
          jq -c '.[]' repos.json | while read repo; do
            NAME=$(echo "$repo" | jq -r '.name')
            BU_TAG=$(echo "$repo" | jq -r '.BU_TAGS')

            echo "🔍 Scanning repo: $NAME"
            echo "🏷 BU Tag: $BU_TAG"

            git clone https://github.com/tejjnayak/$NAME.git
            cd $NAME

            if [ -n "$BU_TAG" ] && [ "$BU_TAG" != "null" ]; then
              endorctl scan \
                --namespace "$ENDOR_NAMESPACE" \
                --project-tags "bu=$BU_TAG"
            else
              endorctl scan \
                --namespace "$ENDOR_NAMESPACE"
            fi

            cd ..
            rm -rf "$NAME"
          done
